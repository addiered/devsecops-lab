name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Least-privilege token — only read by default
permissions:
  contents: read
  security-events: write   # needed for CodeQL to upload results

jobs:
  # ─── Stage 1: Lint & Test ─────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          cd app
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage.xml

  # ─── Stage 2: SAST with Semgrep ───────────────────────────────────
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: lint-and-test   # only runs if tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/flask
            p/owasp-top-ten
            p/secrets
          # Fail on high-severity findings
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # optional for free tier

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even on failure to see findings
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ─── Stage 2b: SAST with CodeQL ───────────────────────────────────
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended   # broader security query set

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
