name: Secrets Scan

on:
  push:
    branches: ["**"]       # runs on all branches
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history needed for accurate scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If a secret is found, the job fails — pipeline blocked
